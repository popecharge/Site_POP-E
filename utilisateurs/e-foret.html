<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>POP-E | Notre Impact</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Bebas+Neue&family=Syne:wght@800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">

  <style>
    /* Styles propres à cette page uniquement.
       #navbar, .nav-link, .nav-back et .lang-switcher viennent déjà de /css/app.css */

    #ef-hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* fix iOS Safari (barre d'adresse) */
      background: var(--black);
      overflow: hidden;
    }

    #ef-bg {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* ===== RESPONSIVE ===== */

    /* Tablette (portrait & paysage) */
    @media (max-width: 1200px) {
      #navbar {
        padding: 16px 20px;
      }
      #navbar a img {
        max-width: 110px;
      }
    }

    /* Téléphone */
    @media (max-width: 600px) {
      #navbar {
        padding: 12px 16px;
      }
      #navbar a img {
        max-width: 90px;
      }
      .nav-back {
        font-size: 14px;
      }
      .lang-code {
        display: none; /* ne garde que le drapeau sur petit écran */
      }
    }
  </style>
</head>
<body>

  <div id="ef-hero">
    <img id="ef-bg" src="/img/app/e-foret.jpeg" alt="Impact POP-E - plantation de forêts">

    <nav id="navbar">
      <a href="/"><img src="/img/logo2.png" alt="POP-E Logo"></a>

      <div id="navbar-right">
        <a href="#" id="ef-back" class="nav-link nav-back" data-i18n="nav_back">← Retour</a>

        <!-- LANG SWITCHER -->
        <div class="lang-switcher">
          <button class="lang-btn" id="lang-btn" aria-haspopup="listbox" aria-expanded="false">
            <span class="lang-flag" id="lang-flag">🇫🇷</span>
            <span class="lang-code" id="lang-code">FR</span>
            <svg class="lang-chevron" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="2,3 5,7 8,3"/>
            </svg>
          </button>
          <div class="lang-dropdown" id="lang-dropdown" role="listbox">
            <div class="lang-option" data-lang="fr" role="option">
              <span class="lang-flag">🇫🇷</span> Français
            </div>
            <div class="lang-option" data-lang="en" role="option">
              <span class="lang-flag">🇬🇧</span> English
            </div>
          </div>
        </div>

      </div>
    </nav>
  </div>

  <script src="/js/lang.js"></script>
  <script>
    // ===== Images selon device + langue =====
    // ⚠️ Le nom de variable "currentLang" est déjà utilisé en global par lang.js (let currentLang = ...).
    // On utilise donc "efHeroLang" ici pour ne JAMAIS entrer en conflit, sinon
    // tout ce bloc <script> plante au chargement (SyntaxError) et plus rien ne marche,
    // y compris le bouton retour.
    var HERO_IMAGES = {
      desktop:        { fr: '/img/app/e-foret.jpeg',                en: '/img/app/e-foretEN.png' },
      phone:          { fr: '/img/app/eforet-tlfn.png',             en: '/img/app/eforet-tlfnEN.png' },
      ipad:           { fr: '/img/app/eforet-ipad.png',             en: '/img/app/eforet-ipadEN.png' },
      tabletPortrait: { fr: '/img/app/eforet-TablettePortrait.png', en: '/img/app/eforet-TablettePortraitEN.png' }
    };

    // Détecte la catégorie d'écran en fonction de la largeur + de l'orientation
    function getEfBreakpoint() {
      var w = window.innerWidth;
      var isPortrait = window.matchMedia('(orientation: portrait)').matches;

      if (w <= 600) return 'phone';
      if (w <= 1200) return isPortrait ? 'tabletPortrait' : 'ipad';
      return 'desktop';
    }

    var efHeroLang = 'fr';

    // Change la photo de fond selon la langue ET la taille d'écran
    function setHeroImage(lang) {
      var img = document.getElementById('ef-bg');
      if (!img) return;

      var bp = getEfBreakpoint();
      var set = HERO_IMAGES[bp] || HERO_IMAGES.desktop;
      var src = (lang === 'en') ? set.en : set.fr;

      if (img.getAttribute('src') !== src) {
        img.src = src;
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Langue de départ : on récupère la langue déjà gérée par lang.js
      // (lang.js expose window.getCurrentLang(), basé sur localStorage + <html lang>)
      efHeroLang = (typeof window.getCurrentLang === 'function')
        ? window.getCurrentLang()
        : (document.documentElement.lang === 'en' ? 'en' : 'fr');

      setHeroImage(efHeroLang);

      // À chaque clic sur une option du switcher, on met à jour la langue + la photo
      // (lang.js gère déjà l'ouverture/fermeture du dropdown et applyLang() ;
      // ce listener ne fait QUE mettre à jour l'image de fond, en plus, sans rien casser)
      document.querySelectorAll('.lang-option').forEach(function (option) {
        option.addEventListener('click', function () {
          efHeroLang = option.getAttribute('data-lang');
          setHeroImage(efHeroLang);
        });
      });

      // Bouton retour : revient à la page précédente, sinon repli sur l'accueil
      var backBtn = document.getElementById('ef-back');
      if (backBtn) {
        backBtn.addEventListener('click', function (e) {
          e.preventDefault();
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = '/';
          }
        });
      }

      // Recalcule la bonne image au redimensionnement (debounce pour éviter le spam)
      var resizeTimer;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          setHeroImage(efHeroLang);
        }, 150);
      });

      // Recalcule aussi au changement d'orientation (tablette portrait <-> paysage)
      window.addEventListener('orientationchange', function () {
        setTimeout(function () {
          setHeroImage(efHeroLang);
        }, 200);
      });
    });
  </script>

</body>
</html>
