<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique — POP-E</title>    
  <link rel="icon" type="image/png" href="/img/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    @property --angle-ring {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      overflow-y: auto;
      position: relative;
    }

    /* ── fond animé ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(145, 9, 240, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 50%, rgba(173, 255, 0, 0.08) 0%, transparent 70%);
      z-index: 0;
      animation: bgShift 6s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* ── navbar ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
    }

    nav img {
      width: 210px;
    }

    .nav-back {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #ADFF00;
      border: 1px solid rgba(173, 255, 0, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .nav-back:hover {
      background: rgba(173, 255, 0, 0.08);
    }

    /* ── contenu central ── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      text-align: center;
      padding: 20px;
    }

    /* ── anneau tournant ── */
    .ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .ring-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--angle-ring),
        transparent 0%,
        transparent 55%,
        #7f00b6 70%,
        #cc44ff 78%,
        #ffffff 82%,
        #ADFF00 86%,
        #cc44ff 90%,
        #7f00b6 95%,
        transparent 100%
      );
      animation: spinRing 3s linear infinite;
      z-index: 0;
    }

    @keyframes spinRing {
      to { --angle-ring: 360deg; }
    }

    .ring-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #0a0a0a;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-inner img {
      width: 140px;
      margin-left: 10%;
      margin-top: 10%;
      filter: drop-shadow(0 0 12px rgba(173, 255, 0, 0.5));
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── texte ── */
    .label-soon {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(11px, 1.5vw, 13px);
      letter-spacing: 0.25em;
      color: #7f00b6;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      line-height: 0.95;
      color: #fff;
    }

    h1 em {
      font-style: italic;
      color: #ADFF00;
      text-shadow: 0 0 30px rgba(173, 255, 0, 0.5);
    }

    .sub {
      font-size: clamp(13px, 1.5vw, 16px);
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      max-width: 360px;
      line-height: 1.6;
    }

    /* ── barre de progression ── */
    .progress-wrap {
      width: min(320px, 80vw);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #7f00b6, #cc44ff, #ADFF00);
      border-radius: 999px;
      animation: fillBar 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s;
      box-shadow: 0 0 10px rgba(173, 255, 0, 0.4);
    }

    @keyframes fillBar {
      to { width: 68%; }
    }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(227, 0, 255, 0.35);
      border-radius: 999px;
      padding: 8px 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6);
      box-shadow: 0 0 20px rgba(227, 0, 255, 0.12);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #E300FF;
      box-shadow: 0 0 8px #E300FF;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── bouton retour ── */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(173, 255, 0, 0.08);
      border: 1px solid rgba(173, 255, 0, 0.35);
      border-radius: 999px;
      padding: 11px 28px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #ADFF00;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 16px rgba(173, 255, 0, 0.15);
    }

    .btn-back:hover {
      background: rgba(173, 255, 0, 0.15);
      box-shadow: 0 0 30px rgba(173, 255, 0, 0.3);
      transform: translateY(-2px) scale(1.03);
    }

    /* ── grains de fond ── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      nav { padding: 14px 16px; }
      nav img { width: 100px; }
    }
  </style>
</head>
<body>

  <div class="grain"></div>

  <nav>
    <img src="/img/logo2.png" alt="POP-E">
    <a href="/utilisateurs/app.html" class="nav-back">← Retour</a>
  </nav>

  <div class="stage">

    <div class="ring-wrap">
      <div class="ring-inner">
        <img src="/img/logo2.png" alt="POP-E">
      </div>
    </div>

    <span class="label-soon">Bientôt disponible</span>

    <h1>LIFESTYLE<br><em>POP-E</em></h1>

    <p class="sub">La boutique arrive. Produits exclusifs,<br>énergie partout, style festival.</p>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span>EN CONSTRUCTION</span>
        <span>68%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Ouverture prévue très prochainement
    </div>

    <a href="/utilisateurs/app.html" class="btn-back">← Retour à l'app</a>

  </div>

</body>
</html>
