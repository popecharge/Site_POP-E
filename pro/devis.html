<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-fr="POP-E | Demande de devis" data-en="POP-E | Quotation Request">POP-E | Demande de devis</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/devis.css">

</head>
<body>

    <header>
        <img src="/img/logo2.png" alt="POP-E Logo" class="logo">
        
        <div class="lang-switcher">
            <button class="translate-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false">
                <span class="lang-flag" id="currentFlag">🇫🇷</span> 
                <span id="currentCode">FR</span> 
                <i class="fas fa-chevron-down" style="font-size: 0.7em; margin-left: 4px;"></i>
            </button>
            <div class="lang-dropdown" id="langDropdown" role="listbox">
                </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1 data-fr="DEMANDE DE <span class='accent'>DEVIS</span>" data-en="QUOTATION <span class='accent'>REQUEST</span>">DEMANDE DE <span class="accent">DEVIS</span></h1>
            <p class="subtitle" data-fr="Parlez-nous de votre événement,<br> on vous prépare une offre <strong>sur-mesure</strong>." data-en="Tell us about your event,<br> we will prepare a <strong>custom</strong> offer.">Parlez-nous de votre événement,<br> on vous prépare une offre <strong>sur-mesure</strong>.</p>
        </section>

        <section class="form-container">
            <form action="#" method="POST">
                
                <div class="form-row">
                    <div class="form-group">
                        <label><span data-fr="NOMBRE DE PERSONNES" data-en="NUMBER OF GUESTS">NOMBRE DE PERSONNES</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input type="text" data-fr="Ex : 80 personnes" data-en="E.g., 80 people" placeholder="Ex : 80 personnes" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><span data-fr="DATE DE L'ÉVÉNEMENT" data-en="EVENT DATE">DATE DE L'ÉVÉNEMENT</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-calendar"></i>
                            <input type="text" data-fr="Sélectionnez une date" data-en="Select a date" placeholder="Sélectionnez une date" required>
                            <i class="far fa-calendar-alt right-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><span data-fr="QUEL TYPE D'ÉVÉNEMENT ?" data-en="WHAT TYPE OF EVENT?">QUEL TYPE D'ÉVÉNEMENT ?</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-bullhorn"></i>
                            <select required>
                                <option value="" disabled selected data-fr="Sélectionnez le type d'événement" data-en="Select event type">Sélectionnez le type d'événement</option>
                                <option value="soiree" data-fr="Soirée d'entreprise" data-en="Corporate Party">Soirée d'entreprise</option>
                                <option value="mariage" data-fr="Mariage" data-en="Wedding">Mariage</option>
                                <option value="anniversaire" data-fr="Anniversaire" data-en="Birthday">Anniversaire</option>
                                <option value="autre" data-fr="Autre" data-en="Other">Autre</option>
                            </select>
                            <i class="fas fa-chevron-down right-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-fr="AUTRE (PRÉCISEZ)" data-en="OTHER (PLEASE SPECIFY)">AUTRE (PRÉCISEZ)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-pen"></i>
                            <input type="text" data-fr="Précisez votre événement" data-en="Specify your event" placeholder="Précisez votre événement">
                        </div>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label><span data-fr="DÉCRIVEZ-NOUS VOTRE ÉVÉNEMENT, VOS ENVIES..." data-en="DESCRIBE YOUR EVENT, YOUR WISHES...">DÉCRIVEZ-NOUS VOTRE ÉVÉNEMENT, VOS ENVIES...</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper" style="align-items: flex-start;">
                            <i class="far fa-lightbulb" style="top: 20px;"></i>
                            <textarea data-fr="Parlez-nous de votre projet en détail..." data-en="Tell us about your project in detail..." placeholder="Parlez-nous de votre projet en détail..." required></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label><span data-fr="LIEU DE L'ÉVÉNEMENT" data-en="EVENT LOCATION">LIEU DE L'ÉVÉNEMENT</span> <span class="asterisk">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" data-fr="Adresse complète" data-en="Full Address" placeholder="Adresse complète" class="no-icon" required>
                    </div>
                </div>
                
                <div class="form-row three-cols">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-map-pin" style="color: rgba(255,255,255,0.4);"></i>
                            <input type="text" data-fr="Code postal" data-en="Zip Code" placeholder="Code postal" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="far fa-building" style="color: rgba(255,255,255,0.4);"></i>
                            <input type="text" data-fr="Ville" data-en="City" placeholder="Ville" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-globe-europe" style="color: rgba(255,255,255,0.4);"></i>
                            <select required>
                                <option value="" disabled selected data-fr="Pays" data-en="Country">Pays</option>
                                <option value="fr" data-fr="France" data-en="France">France</option>
                                <option value="be" data-fr="Belgique" data-en="Belgium">Belgique</option>
                                <option value="ch" data-fr="Suisse" data-en="Switzerland">Suisse</option>
                            </select>
                            <i class="fas fa-chevron-down right-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="separator" data-fr="VOS COORDONNÉES" data-en="YOUR CONTACT INFO">VOS COORDONNÉES</div>

                <div class="form-row">
                    <div class="form-group">
                        <label><span data-fr="PRÉNOM" data-en="FIRST NAME">PRÉNOM</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input type="text" data-fr="Votre prénom" data-en="Your first name" placeholder="Votre prénom" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><span data-fr="NOM" data-en="LAST NAME">NOM</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input type="text" data-fr="Votre nom" data-en="Your last name" placeholder="Votre nom" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><span data-fr="E-MAIL" data-en="EMAIL">E-MAIL</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-envelope"></i>
                            <input type="email" data-fr="votre@email.com" data-en="your@email.com" placeholder="votre@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><span data-fr="TÉLÉPHONE" data-en="PHONE NUMBER">TÉLÉPHONE</span> <span class="asterisk">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone-alt"></i>
                            <input type="tel" data-fr="06 12 34 56 78" data-en="06 12 34 56 78" placeholder="06 12 34 56 78" required>
                        </div>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label><span data-fr="NOM DE L'ENTREPRISE" data-en="COMPANY NAME">NOM DE L'ENTREPRISE</span> <span style="color: rgba(255,255,255,0.4); font-weight: 400; text-transform: none;" data-fr="(Optionnel)" data-en="(Optional)">(Optionnel)</span></label>
                        <div class="input-wrapper">
                            <i class="far fa-building"></i>
                            <input type="text" data-fr="Nom de votre entreprise" data-en="Your company name" placeholder="Nom de votre entreprise">
                        </div>
                    </div>
                </div>

                <div class="options-box">
                    <input type="checkbox" class="custom-checkbox">
                    <div class="option-img">
                        <i class="fas fa-camera-retro" style="font-size: 32px; color: var(--accent);"></i>
                    </div>
                    <div class="option-content">
                        <span class="opt-label" data-fr="OPTIONS DISPONIBLES" data-en="AVAILABLE OPTIONS">OPTIONS DISPONIBLES</span>
                        <h4 data-fr="VIDÉOBOOTH 360°" data-en="360° VIDEOBOOTH">VIDÉOBOOTH 360°</h4>
                        <p data-fr="Souvenir avec logo & message personnalisé." data-en="Keepsake with custom logo & message.">Souvenir avec logo & message personnalisé.</p>
                    </div>
                </div>

                <div class="btn-submit-wrapper">
                    <button type="submit" class="btn-cta">
                        <span data-fr="ENVOYER MA DEMANDE DE DEVIS" data-en="SEND MY QUOTATION REQUEST">ENVOYER MA DEMANDE DE DEVIS</span>
                        <span class="btn-cta-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </span>
                    </button>
                </div>

            </form>

            <div class="security-info">
                <i class="fas fa-lock"></i> <span data-fr="Vos informations sont 100% sécurisées et confidentielles." data-en="Your information is 100% secure and confidential.">Vos informations sont 100% sécurisées et confidentielles.</span>
            </div>
        </section>
    </main>

    <script>
        /* ── Language Switcher Logic ── */
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        const currentFlag = document.getElementById('currentFlag');
        const currentCode = document.getElementById('currentCode');

        const LANGS = {
            fr: { flag: '🇫🇷', code: 'FR' },
            en: { flag: '🇬🇧', code: 'EN' }
        };

        let currentLang = 'fr';

        function applyLanguage(lang) {
            document.querySelectorAll('[data-fr]').forEach(el => {
                const val = el.getAttribute('data-' + lang);
                if (val !== null) {
                    // Vérifie s'il s'agit d'un input ou textarea pour traduire le placeholder
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = val;
                    } else {
                        el.innerHTML = val;
                    }
                }
            });
            document.documentElement.lang = lang;
        }

        function updateButton(lang) {
            currentFlag.textContent = LANGS[lang].flag;
            currentCode.textContent = LANGS[lang].code;
        }

        function updateDropdown(lang) {
            langDropdown.innerHTML = '';
            Object.entries(LANGS).forEach(([key, info]) => {
                if (key === lang) return;
                const opt = document.createElement('div');
                opt.className = 'lang-option';
                opt.setAttribute('role', 'option');
                opt.setAttribute('data-lang', key);
                opt.innerHTML = `<span class="lang-flag">${info.flag}</span><span>${info.code}</span>`;
                opt.addEventListener('click', () => switchLang(key));
                langDropdown.appendChild(opt);
            });
        }

        function switchLang(lang) {
            currentLang = lang;
            applyLanguage(lang);
            updateButton(lang);
            updateDropdown(lang);
            closeDropdown();
        }

        function openDropdown() {
            langDropdown.classList.add('visible');
            langBtn.classList.add('open');
            langBtn.setAttribute('aria-expanded', 'true');
        }

        function closeDropdown() {
            langDropdown.classList.remove('visible');
            langBtn.classList.remove('open');
            langBtn.setAttribute('aria-expanded', 'false');
        }

        langBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langDropdown.classList.contains('visible') ? closeDropdown() : openDropdown();
        });

        document.addEventListener('click', closeDropdown);
        langDropdown.addEventListener('click', (e) => e.stopPropagation());

        // Initialisation
        updateDropdown('fr');
    </script>
</body>
</html>
